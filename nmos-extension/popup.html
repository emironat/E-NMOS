<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 260px; padding: 16px; font-family: 'Consolas', monospace; background: #0d0f12; color: #e8eaf0; margin: 0; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo-icon { width: 24px; height: 24px; border: 1.5px solid #4a9eff; border-radius: 5px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
  .logo-icon::before { content: ''; width: 7px; height: 7px; background: #4a9eff; border-radius: 50%; }
  .logo-text { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; }
  .logo-sub { font-size: 9px; color: #666e85; letter-spacing: 0.1em; }
  label { font-size: 10px; color: #666e85; letter-spacing: 0.08em; display: block; margin-bottom: 5px; }
  input { width: 100%; background: #1a1e25; border: 1px solid #2c3140; border-radius: 6px; color: #4a9eff; font-family: 'Consolas', monospace; font-size: 12px; padding: 7px 10px; outline: none; box-sizing: border-box; }
  input:focus { border-color: #4a9eff; }
  input::placeholder { color: #444; }
  button { width: 100%; margin-top: 10px; background: #4a9eff; color: #fff; border: none; border-radius: 6px; padding: 9px; font-family: 'Consolas', monospace; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; }
  button:hover { opacity: 0.85; }
  .hint { font-size: 10px; color: #444; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<div class="logo">
  <img src="logo.svg" height="48" alt="E-NMOS" style="display:block;margin-bottom:4px"/>
  <div style="font-size:8px;color:#555e70;font-family:monospace;text-align:center;margin-bottom:12px;letter-spacing:.04em;">v2.1.32</div>
</div>
<label>NMOS API BASE URL</label>
<input id="url" type="text" placeholder="http://10.101.99.26/x-nmos" spellcheck="false" />
<button id="open">▶ OPEN BROWSER</button>
<div class="hint">Enter your Node or Query API URL and click Open. The browser launches in a full tab.</div>
<script src="popup.js"></script>
</body>
</html>
